databases:
  - name: vitaduo-db
    databaseName: vitaduo_db
    user: vitaduo_db_user
    plan: free
    region: oregon
    postgresMajorVersion: "15"

services:
  - type: web
    name: vitaduo-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.10.13"
