services:
  - type: web
    name: vitaduo-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GLM_API_KEY
        sync: false
      - key: GLM_API_BASE
        value: https://open.bigmodel.cn/api/coding/paas/v4/chat/completions
      - key: GLM_MODEL
        value: glm-4-plus
      - key: DEBUG
        value: "False"
